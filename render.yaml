services:
  - type: web
    name: youpdf-telegram-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    healthCheckPath: /
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: DASHBOARD_ADMIN_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
